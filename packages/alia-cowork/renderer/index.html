<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.alia.onl wss://*.alia.onl" />
    <title>Alia Cowork</title>
    <script>
      // Theme script - runs before render to prevent flash
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'system';
          let effectiveTheme = theme;

          if (theme === 'system') {
            effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }

          document.documentElement.classList.add(effectiveTheme);
        } catch (e) {
          // Default to dark if error
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      html, body, #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Base font size - 18px for desktop app readability */
      html {
        font-size: 18px;
        text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
