name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # bun 1.3.14's --frozen-lockfile falsely reports drift for this monorepo,
      # so we assert lockfile stability via `git diff --exit-code bun.lock` instead.
      - name: Install dependencies
        run: |
          bun install
          git diff --exit-code bun.lock

      - name: Lint API
        run: bun run --filter @alia/api lint

      - name: Run API tests
        run: bun run --filter @alia/api test

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # bun 1.3.14's --frozen-lockfile falsely reports drift for this monorepo,
      # so we assert lockfile stability via `git diff --exit-code bun.lock` instead.
      - name: Install dependencies
        run: |
          bun install
          git diff --exit-code bun.lock

      - name: Build API
        run: bun run build:api

  build-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # bun 1.3.14's --frozen-lockfile falsely reports drift for this monorepo,
      # so we assert lockfile stability via `git diff --exit-code bun.lock` instead.
      - name: Install dependencies
        run: |
          bun install
          git diff --exit-code bun.lock

      - name: Build Gateway
        run: bun run build:gateway
