name: Deploy Frontends

on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - 'apps/alia-gateway-admin/**'
      - 'packages/**'
      - 'bun.lock'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.changes.outputs.app }}
      gateway-admin: ${{ steps.changes.outputs.gateway-admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'packages/**'
              - 'bun.lock'
            gateway-admin:
              - 'apps/alia-gateway-admin/**'
              - 'packages/**'
              - 'bun.lock'

  deploy-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build app
        run: bun run build:app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/app/dist --project-name=alia-app --branch=main

  deploy-gateway-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway-admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build gateway admin
        run: bun run build:gateway-admin
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          NODE_ENV: production
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/alia-gateway-admin/dist --project-name=alia-gateway-admin --branch=main
