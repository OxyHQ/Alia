name: alia-gateway-admin
region: nyc

static_sites:
  - name: admin
    github:
      branch: main
      deploy_on_push: true
      repo: Alia-onl/Alia

    # Source directory (monorepo path)
    source_dir: /apps/alia-gateway-admin

    # Build configuration
    build_command: bun install && bun run build

    # Output directory (relative to source_dir)
    output_dir: dist

    # Environment variables
    envs:
      - key: VITE_GATEWAY_API_URL
        value: https://api.gateway.alia.onl/gateway
        scope: BUILD_TIME

    # Routes configuration for SPA
    routes:
      - path: /

    # Custom domain
    domains:
      - domain: gateway.alia.onl
        type: PRIMARY
