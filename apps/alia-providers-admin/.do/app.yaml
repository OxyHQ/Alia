name: alia-providers-admin
region: nyc

static_sites:
  - name: admin
    github:
      branch: main
      deploy_on_push: true
      repo: Alia-onl/Alia

    # Source directory (monorepo path)
    source_dir: /apps/alia-providers-admin

    # Build configuration
    build_command: npm install --include=dev && npm run build

    # Output directory (relative to source_dir)
    output_dir: dist

    # Environment variables
    envs:
      - key: VITE_PROVIDERS_API_URL
        value: https://api.alia.onl/internal/providers
        scope: BUILD_TIME

    # Routes configuration for SPA
    routes:
      - path: /

    # Custom domain
    domains:
      - domain: providers.alia.onl
        type: PRIMARY
