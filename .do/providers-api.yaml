# DigitalOcean App Platform spec for alia-providers-api (separate app)
# Internal service that manages AI providers (Gemini, OpenAI, Groq, etc.)
# Not exposed to end users — communicates with alia API via HMAC-authenticated HTTP
name: alia-providers-api
region: ams

services:
  - name: providers-api
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true

    build_command: npm ci --include=dev && npm run build:providers-api
    run_command: npm run start:providers-api
    source_dir: /
    environment_slug: node-js

    # Upgraded from apps-s-1vcpu-0.5gb (was at 35.5% memory on 512MB)
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1

    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    http_port: 9091

    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "9091"
      - key: MONGODB_URI
        type: SECRET
      - key: SERVICE_SECRET
        type: SECRET
      - key: OXY_API_URL
        value: "https://api.oxy.so"
      - key: ADMIN_USERNAMES
        value: "nate"

domains:
  - domain: api.providers.alia.onl
    type: PRIMARY
    zone: alia.onl
  - domain: providers.alia.onl
    type: ALIAS
    zone: alia.onl

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: COMPONENT_RESTARTING
