name: alia-api
region: nyc

services:
  - name: api
    github:
      branch: main
      deploy_on_push: true

    # Build configuration (runs from monorepo root)
    build_command: npm ci && npm run build:api

    # Run configuration (runs from monorepo root)
    run_command: npm run start:api

    # Environment
    environment_slug: node-js

    # Instance size
    instance_size_slug: basic-xxs
    instance_count: 1

    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # HTTP port
    http_port: 8080

    # Environment variables (set these in DO dashboard)
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: PROVIDERS_API_URL
        value: "${providers-api.INTERNAL_URL}"
      - key: SERVICE_SECRET
        type: SECRET

  - name: providers-api
    github:
      branch: main
      deploy_on_push: true

    # Build configuration (runs from monorepo root)
    build_command: npm ci && npm run build:providers-api

    # Run configuration (runs from monorepo root)
    run_command: npm run start:providers-api

    # Environment
    environment_slug: node-js

    # Instance size
    instance_size_slug: basic-xxs
    instance_count: 1

    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # HTTP port
    http_port: 9091

    # Environment variables (set these in DO dashboard)
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "9091"
      - key: MONGODB_URI
        type: SECRET
      - key: SERVICE_SECRET
        type: SECRET
      - key: OXY_API_URL
        value: "https://api.oxy.so"
      - key: ADMIN_USERNAMES
        value: "nate"
