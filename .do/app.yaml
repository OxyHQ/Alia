# DigitalOcean App Platform spec for alia-production
# NOTE: The actual deployment is managed via DO dashboard.
# This file serves as documentation and reference.
# Actual app name: alia-production | App ID: 47f815eb-e095-44c9-a0a4-c315307dac22
name: alia-production
region: ams

services:
  - name: alia
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true

    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:api
    run_command: bun run start:api
    source_dir: /
    environment_slug: node-js
    instance_size_slug: apps-s-2vcpu-4gb
    instance_count: 2

    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    http_port: 8080

    envs:
      - key: MONGODB_URI
        value: "${db-oxy.DATABASE_URL}"
      - key: CA_CERT
        value: "${db-oxy.CA_CERT}"
      - key: REDIS_URL
        value: "${db-valkey.DATABASE_URL}"
      - key: REDIS_CA_CERT
        value: "${db-valkey.CA_CERT}"
      - key: SERVICE_SECRET
        type: SECRET
      - key: GATEWAY_API_URL
        value: "http://gateway:9091"
      - key: WEB_URL
        value: "https://alia.onl"
      # S3/Spaces
      - key: AWS_REGION
        value: "ams3"
      - key: AWS_ACCESS_KEY_ID
        type: SECRET
      - key: AWS_SECRET_ACCESS_KEY
        type: SECRET
      - key: AWS_ENDPOINT_URL
        value: "https://ams3.digitaloceanspaces.com"
      - key: AWS_S3_BUCKET
        value: "bucket-alia"
      # Stripe
      - key: STRIPE_SECRET_KEY
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        type: SECRET
      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        type: SECRET
      - key: TELEGRAM_BOT_USERNAME
        value: "alia_onlbot"
      # LiveKit
      - key: LIVEKIT_URL
        value: "wss://livekit.oxy.so"
      - key: LIVEKIT_API_KEY
        type: SECRET
      - key: LIVEKIT_API_SECRET
        type: SECRET
      - key: LIVEKIT_INTERNAL_URL
        value: "wss://livekit.oxy.so"

  - name: gateway
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true

    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:gateway
    run_command: bun run start:gateway
    source_dir: /
    environment_slug: node-js

    # Upgraded from apps-s-1vcpu-0.5gb (was at 35.5% memory on 512MB)
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1

    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    http_port: 9091

    envs:
      - key: MONGODB_URI
        value: "${db-oxy.DATABASE_URL}"
      - key: CA_CERT
        value: "${db-oxy.CA_CERT}"
      - key: PORT
        value: "9091"
      - key: SERVICE_SECRET
        type: SECRET
      - key: OXY_API_URL
        value: "https://api.oxy.so"
      - key: ADMIN_USERNAMES
        value: "nate"

  - name: alia-console
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true
    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:admin
    run_command: bun run start:admin
    source_dir: /
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080

  - name: integrations
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true
    dockerfile_path: packages/integrations/Dockerfile
    source_dir: /
    instance_size_slug: apps-s-2vcpu-4gb
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 120
      period_seconds: 15
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 10
      port: 3005
    internal_ports:
      - 3005

  - name: alia-canvas
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true
    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:canvas
    run_command: bun run start:canvas
    source_dir: /
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 3002

static_sites:
  - name: alia-apps-app
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true
    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:app
    source_dir: /
    environment_slug: node-js
    output_dir: packages/app/dist
    catchall_document: index.html

  - name: gateway-admin
    github:
      repo: Alia-onl/Alia
      branch: main
      deploy_on_push: true
    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:gateway-admin
    source_dir: /
    environment_slug: node-js
    output_dir: packages/alia-gateway-admin/dist
    catchall_document: index.html

databases:
  - name: db-oxy
    engine: MONGODB
    version: "8"
    production: true
    cluster_name: db-oxy
  - name: db-valkey
    engine: REDIS
    version: "7"
    production: true
    cluster_name: db-valkey-ams3-04785

domains:
  - domain: alia.onl
    type: PRIMARY
    zone: alia.onl
  - domain: api.alia.onl
    type: ALIAS
    zone: alia.onl
  - domain: api.gateway.alia.onl
    type: ALIAS
    zone: alia.onl
  - domain: gateway.alia.onl
    type: ALIAS
    zone: alia.onl
  - domain: console.alia.onl
    type: ALIAS
    zone: alia.onl
  - domain: canvas.alia.onl
    type: ALIAS
    zone: alia.onl

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE
